services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: masjidhub
      POSTGRES_PASSWORD: masjidhub
      POSTGRES_DB: masjidhub
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U masjidhub -d masjidhub']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://masjidhub:masjidhub@db:5432/masjidhub?schema=public
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://masjidhub:masjidhub@db:5432/masjidhub?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment or .env}
      SWAGGER_ENABLED: 'true'
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
